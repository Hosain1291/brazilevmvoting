<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urna Eletrônica Simulador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Inter:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
        }
        /* 반응형 투표기 본체: 모바일은 유동적, 데스크톱은 기존 규격 보존 */
        .urna-body {
            width: 100%;
            max-width: 800px;
            background-color: #e0e0e0;
            border: 2px solid #333;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2), inset 0 0 10px rgba(0,0,0,0.1);
        }
        .teclado {
            background-color: #3d3d3d;
            border-radius: 8px;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.5);
        }
        .tecla {
            background-color: #282828;
            color: white;
            font-weight: bold;
            border: 1px solid #1a1a1a;
            box-shadow: 0 4px #1a1a1a;
            transition: all 0.1s ease;
        }
        .tecla:active {
            box-shadow: 0 2px #1a1a1a;
            transform: translateY(2px);
        }
        .tecla-branco { background-color: #f5f5f5; color: #333; box-shadow: 0 4px #b0b0b0; }
        .tecla-branco:active { box-shadow: 0 2px #b0b0b0; }
        .tecla-corrige { background-color: #f08202; color: white; box-shadow: 0 4px #c06801; }
        .tecla-corrige:active { box-shadow: 0 2px #c06801; }
        .tecla-confirma { background-color: #00965a; color: white; box-shadow: 0 4px #006b3f; }
        .tecla-confirma:active { box-shadow: 0 2px #006b3f; }

        .tela {
            background-color: #d1d5db;
            border: 5px solid #a1a1aa;
        }
        .numero-input {
            border: 2px solid #333;
            font-family: 'Roboto Mono', monospace;
            font-weight: 700;
        }
        .fim-tela {
             background-color: #d1d5db;
        }
        /* 반응형 관리 패널 */
        .management-panel {
            width: 100%;
            max-width: 400px;
        }
        .drop-zone {
            border: 2px dashed #cbd5e1;
            transition: background-color 0.2s ease, border-color 0.2s ease;
            cursor: pointer;
        }
        .drop-zone.dragover {
            background-color: #e0e7ff;
            border-color: #818cf8;
        }
        /* 고급 스크롤바 스타일링 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        .photo-box {
            border: 2px solid #333;
            background-color: white;
            position: relative;
        }
        .photo-label {
            position: absolute;
            bottom: 0;
            right: 0;
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 10px;
            padding: 1px 3px;
        }
    </style>
</head>
<body class="bg-gray-300 flex items-center justify-center min-h-screen p-2 sm:p-4">

    <!-- 모달 백드롭 -->
    <div id="modal-backdrop" class="fixed inset-0 bg-black bg-opacity-50 hidden z-40"></div>
    
    <!-- 삭제 확인 모달 -->
    <div id="confirm-modal" class="fixed inset-0 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-lg p-6 w-full max-w-sm mx-4">
            <h3 class="text-lg font-bold mb-4">삭제 확인</h3>
            <p id="confirm-modal-body" class="mb-6">정말로 이 항목을 삭제하시겠습니까?</p>
            <div class="flex justify-end gap-4">
                <button id="modal-cancel-btn" class="px-4 py-2 bg-gray-200 rounded-md hover:bg-gray-300 transition">취소</button>
                <button id="modal-confirm-btn" class="px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700 transition">삭제</button>
            </div>
        </div>
    </div>
    
    <!-- 결과 모달 -->
    <div id="results-modal" class="fixed inset-0 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-lg p-6 w-full max-w-md mx-4 flex flex-col" style="height: 85vh; max-height: 700px;">
            <div class="flex justify-between items-center mb-4">
                <h3 id="results-modal-title" class="text-xl font-bold">투표 결과</h3>
                <button id="results-modal-close-btn" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="results-modal-body" class="overflow-y-auto custom-scrollbar flex-grow pr-2">
                <!-- 결과 내용 삽입 영역 -->
            </div>
            <div class="mt-4 pt-4 border-t flex justify-end">
                <button id="results-modal-footer-close-btn" class="px-4 py-2 bg-gray-600 text-white rounded-md hover:bg-gray-700 transition">닫기</button>
            </div>
        </div>
    </div>

    <!-- 전체 반응형 그리드 래퍼 -->
    <div class="flex flex-col lg:flex-row items-center lg:items-start justify-center gap-6 lg:gap-8 w-full max-w-6xl">
        
        <!-- 투표 기계 본체 -->
        <div class="urna-body flex flex-col md:flex-row p-4 sm:p-6 gap-4 sm:gap-6 w-full h-auto md:h-[600px]">
            <!-- 화면 영역 (Screen) -->
            <div id="screen" class="tela w-full md:w-[58%] h-[320px] md:h-full flex flex-col justify-between p-3 sm:p-4 relative rounded">
                <div id="main-content" class="w-full">
                    <div class="flex items-start justify-between">
                        <div>
                            <p class="text-xs sm:text-sm font-bold text-gray-700">SEU VOTO PARA</p>
                            <h1 id="office-title" class="text-xl sm:text-2xl lg:text-3xl font-bold mt-2 text-gray-800"></h1>
                        </div>
                        <div class="text-right flex-shrink-0">
                            <p class="text-[10px] sm:text-xs font-bold leading-tight text-gray-700">JUSTIÇA<br>ELEITORAL</p>
                        </div>
                    </div>
                    
                    <div class="mt-4 sm:mt-6 flex flex-col sm:flex-row justify-between gap-2 items-start">
                        <!-- 후보 상세 내용 -->
                        <div class="flex-grow space-y-2 w-full sm:w-auto">
                            <div class="flex items-center gap-2 sm:gap-4">
                                <span class="text-sm sm:text-base text-gray-700 font-bold">Número:</span>
                                <div id="number-inputs" class="flex gap-1.5">
                                    <!-- 입력 상자 자동 렌더링 -->
                                </div>
                            </div>
                            <div id="candidate-info" class="mt-2 text-sm sm:text-base space-y-1 hidden">
                                <p class="text-gray-800"><strong>Nome:</strong> <span id="candidate-name" class="font-bold"></span></p>
                                <p class="text-gray-800"><strong>Partido:</strong> <span id="candidate-party" class="font-bold"></span></p>
                                <p id="vice-candidate-info" class="hidden text-gray-800 text-xs sm:text-sm"><strong>Vice-Pres.:</strong> <span id="vice-candidate-name" class="font-semibold"></span></p>
                            </div>
                            <div id="special-message" class="mt-4 text-xl sm:text-2xl font-bold text-center text-red-600 hidden"></div>
                        </div>

                        <!-- 후보 이미지 컨테이너 (모바일 가로 정렬, 데스크톱 세로 정렬) -->
                        <div id="candidate-photo-container" class="flex flex-row sm:flex-col items-center gap-2 flex-shrink-0 self-center sm:self-start ml-auto sm:ml-2">
                            <div id="president-photo-box" class="photo-box w-[80px] h-[100px] sm:w-[110px] sm:h-[130px] rounded shadow-sm overflow-hidden">
                                <img id="candidate-photo" src="https://placehold.co/120x140/d1d5db/d1d5db?text=." alt="Foto do Candidato" class="w-full h-full object-cover">
                                <span class="photo-label">Presidente</span>
                            </div>
                            <div id="vice-president-photo-box" class="photo-box w-[65px] h-[80px] sm:w-[90px] sm:h-[110px] hidden rounded shadow-sm overflow-hidden">
                                <img id="vice-candidate-photo" src="https://placehold.co/100x120/d1d5db/d1d5db?text=." alt="Foto do Vice" class="w-full h-full object-cover">
                                <span class="photo-label">Vice-Pres.</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 하단 투표 가이드 라인 -->
                <div id="instructions" class="border-t border-gray-500 pt-2 text-[10px] sm:text-xs text-gray-700">
                    <p>Aperte a Tecla:</p>
                    <p><strong>VERDE</strong> para CONFIRMAR</p>
                    <p><strong>LARANJA</strong> para CORRIGIR</p>
                </div>

                <!-- 투표 완료 화면 (FIM) -->
                <div id="end-screen" class="fim-tela absolute inset-0 hidden flex-col items-center justify-center text-center rounded">
                    <h1 class="text-6xl sm:text-8xl font-bold text-gray-800 tracking-wider">FIM</h1>
                    <p class="text-sm sm:text-base mt-2 font-semibold text-gray-700">Voto registrado com sucesso!</p>
                    <button onclick="restartVote()" class="mt-4 bg-gray-700 text-white font-bold py-1.5 px-4 rounded hover:bg-gray-800 transition text-xs sm:text-sm shadow">다음 투표 진행 (Avançar)</button>
                </div>
            </div>

            <!-- 키패드 영역 (Keypad) -->
            <div class="teclado w-full md:w-[42%] flex flex-col justify-between p-4 sm:p-5 gap-4">
                <div class="grid grid-cols-3 gap-2.5 sm:gap-3">
                    <button onclick="keypadClicked('1')" class="tecla h-12 sm:h-14 lg:h-16 rounded text-xl sm:text-2xl shadow">1</button>
                    <button onclick="keypadClicked('2')" class="tecla h-12 sm:h-14 lg:h-16 rounded text-xl sm:text-2xl shadow">2</button>
                    <button onclick="keypadClicked('3')" class="tecla h-12 sm:h-14 lg:h-16 rounded text-xl sm:text-2xl shadow">3</button>
                    <button onclick="keypadClicked('4')" class="tecla h-12 sm:h-14 lg:h-16 rounded text-xl sm:text-2xl shadow">4</button>
                    <button onclick="keypadClicked('5')" class="tecla h-12 sm:h-14 lg:h-16 rounded text-xl sm:text-2xl shadow">5</button>
                    <button onclick="keypadClicked('6')" class="tecla h-12 sm:h-14 lg:h-16 rounded text-xl sm:text-2xl shadow">6</button>
                    <button onclick="keypadClicked('7')" class="tecla h-12 sm:h-14 lg:h-16 rounded text-xl sm:text-2xl shadow">7</button>
                    <button onclick="keypadClicked('8')" class="tecla h-12 sm:h-14 lg:h-16 rounded text-xl sm:text-2xl shadow">8</button>
                    <button onclick="keypadClicked('9')" class="tecla h-12 sm:h-14 lg:h-16 rounded text-xl sm:text-2xl shadow">9</button>
                    <button onclick="keypadClicked('0')" class="tecla h-12 sm:h-14 lg:h-16 rounded text-xl sm:text-2xl shadow col-start-2">0</button>
                </div>
                
                <!-- 하단 행정/제어용 키패드 (BRANCO, CORRIGE, CONFIRMA) -->
                <div class="flex justify-between gap-2 pt-2">
                    <button onclick="brancoClicked()" class="tecla-branco w-1/3 h-11 sm:h-13 rounded text-[10px] sm:text-xs font-bold shadow tracking-tighter">BRANCO</button>
                    <button onclick="corrigeClicked()" class="tecla-corrige w-1/3 h-11 sm:h-13 rounded text-[10px] sm:text-xs font-bold shadow tracking-tighter">CORRIGE</button>
                    <button onclick="confirmaClicked()" class="tecla-confirma w-1/3 h-13 sm:h-15 rounded text-xs sm:text-sm font-bold shadow-md tracking-tighter">CONFIRMA</button>
                </div>
            </div>
        </div>

        <!-- 후보 관리 패널 -->
        <div class="management-panel bg-white p-4 sm:p-6 rounded-lg shadow-lg flex flex-col h-auto lg:h-[600px] w-full">
            <h2 class="text-2xl font-bold mb-4 text-gray-800">선거 관리</h2>
            
            <div class="mb-4">
                <label for="election-type" class="block text-sm font-medium text-gray-700 mb-1">선거 유형 선택</label>
                <select id="election-type" class="w-full p-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 text-sm">
                    <option value="presidente">대통령 선거</option>
                    <option value="senador">상원의원 선거</option>
                    <option value="deputado">하원의원 선거</option>
                </select>
            </div>

            <div class="mb-4 flex-grow flex flex-col min-h-[150px] lg:min-h-0">
                <h3 class="text-base font-semibold mb-1 text-gray-700">후보 목록</h3>
                <div id="candidate-list" class="flex-grow overflow-y-auto bg-gray-50 p-2 border rounded-md custom-scrollbar max-h-[160px] lg:max-h-none text-sm">
                    <!-- JS가 후보 목록을 생성합니다. -->
                </div>
            </div>
            
            <div class="mb-4 grid grid-cols-2 gap-2 border-t pt-3">
                <button id="show-results-btn" class="bg-green-600 text-white font-bold py-2 px-2 rounded-md hover:bg-green-700 transition text-xs sm:text-sm">투표 결과 보기</button>
                <button id="reset-votes-btn" class="bg-red-600 text-white font-bold py-2 px-2 rounded-md hover:bg-red-700 transition text-xs sm:text-sm">모든 투표 초기화</button>
            </div>

            <div class="mb-4 grid grid-cols-2 gap-2 border-t pt-3">
                <button id="save-list-btn" class="bg-blue-600 text-white font-bold py-2 px-2 rounded-md hover:bg-blue-700 transition text-xs sm:text-sm">후보 파일 저장</button>
                <button id="load-list-btn" class="bg-gray-600 text-white font-bold py-2 px-2 rounded-md hover:bg-gray-700 transition text-xs sm:text-sm">후보 파일 로드</button>
                <input type="file" id="load-list-input" class="hidden" accept=".json">
            </div>

            <div class="border-t pt-3">
                <h3 class="text-base font-semibold mb-2 text-gray-700">새 후보 추가</h3>
                <form id="add-candidate-form" class="space-y-2 text-sm">
                    <div class="grid grid-cols-3 gap-1">
                        <input type="text" id="candidate-name-input" placeholder="이름" class="p-2 border rounded-md col-span-1" required>
                        <input type="text" id="candidate-party-input" placeholder="정당" class="p-2 border rounded-md col-span-1" required>
                        <input type="text" id="candidate-number-input" placeholder="번호" class="p-2 border rounded-md col-span-1" required>
                    </div>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                        <div id="president-drop-zone" class="drop-zone p-2 text-center rounded-md border bg-gray-50 flex flex-col justify-center items-center min-h-[60px]">
                            <label for="candidate-photo-input" class="text-xs text-gray-500 cursor-pointer block">후보 사진 (선택/드래그)</label>
                            <input type="file" id="candidate-photo-input" class="hidden" accept="image/*">
                            <img id="photo-preview" class="hidden w-12 h-12 object-cover mt-1 rounded border">
                        </div>
                        
                        <!-- 부통령 입력 필드 (대통령 선거 선택 시 자동 노출) -->
                        <div id="vice-president-fields" class="hidden p-2 border rounded-md bg-gray-50 space-y-1">
                             <input type="text" id="vice-candidate-name-input" placeholder="부통령 이름" class="w-full p-1 border rounded text-xs">
                             <div id="vice-president-drop-zone" class="drop-zone p-1 text-center border-dashed border rounded flex flex-col justify-center items-center min-h-[45px]">
                                <label for="vice-candidate-photo-input" class="text-[10px] text-gray-500 cursor-pointer block">부통령 사진</label>
                                <input type="file" id="vice-candidate-photo-input" class="hidden" accept="image/*">
                                <img id="vice-photo-preview" class="hidden w-10 h-10 object-cover mt-1 rounded border">
                             </div>
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-2 px-4 rounded-md hover:bg-indigo-700 transition mt-1">후보 추가</button>
                </form>
            </div>
        </div>

    </div>

    <script>
        // --- 오디오 노드 및 주파수 제어 ---
        let audioContext;
        document.body.addEventListener('click', () => {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }, { once: true });

        function playSound(type) {
            if (!audioContext) return;
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            if (type === 'key') {
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(1000, audioContext.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.05);
            } else if (type === 'confirm') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(1500, audioContext.currentTime);
                gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.4);
            }
        }

        // --- 선거 시스템 상태 값 ---
        let elections = {
            'presidente': {
                title: 'PRESIDENTE', digits: 2,
                candidates: {
                    '13': { name: 'Dilma Rousseff', party: 'PT', photo: 'https://placehold.co/120x140/c0c0c0/000?text=Dilma', viceName: 'Michel Temer', vicePhoto: 'https://placehold.co/100x120/c0c0c0/000?text=Temer' },
                    '17': { name: 'Jair Bolsonaro', party: 'PSL', photo: 'https://placehold.co/120x140/c0c0c0/000?text=Bolsonaro', viceName: 'Hamilton Mourão', vicePhoto: 'https://placehold.co/100x120/c0c0c0/000?text=Mourão' }
                }
            },
            'senador': {
                title: 'SENADOR', digits: 3,
                candidates: {
                    '455': { name: 'Tarsila do Amaral', party: 'PART', photo: 'https://placehold.co/120x140/c0c0c0/000?text=Tarsila' }
                }
            },
            'deputado': {
                title: 'DEPUTADO FEDERAL', digits: 4,
                candidates: {
                    '1234': { name: 'Machado de Assis', party: 'PBL', photo: 'https://placehold.co/120x140/c0c0c0/000?text=Machado' }
                }
            }
        };

        let voteCounts = {};
        let currentElectionType = 'presidente';
        let currentNumber = '';
        let isBlankVote = false;
        let actionToConfirm = null;

        // --- DOM 연결 ---
        const officeTitleEl = document.getElementById('office-title');
        const numberInputsEl = document.getElementById('number-inputs');
        const candidateInfoEl = document.getElementById('candidate-info');
        const candidateNameEl = document.getElementById('candidate-name');
        const candidatePartyEl = document.getElementById('candidate-party');
        const candidatePhotoEl = document.getElementById('candidate-photo');
        const viceCandidateInfoEl = document.getElementById('vice-candidate-info');
        const viceCandidateNameEl = document.getElementById('vice-candidate-name');
        const viceCandidatePhotoEl = document.getElementById('vice-candidate-photo');
        const vicePresidentPhotoBoxEl = document.getElementById('vice-president-photo-box');
        const instructionsEl = document.getElementById('instructions');
        const specialMessageEl = document.getElementById('special-message');
        const mainContentEl = document.getElementById('main-content');
        const endScreenEl = document.getElementById('end-screen');
        const electionTypeSelector = document.getElementById('election-type');
        const candidateListEl = document.getElementById('candidate-list');
        const addCandidateForm = document.getElementById('add-candidate-form');
        const photoPreviewEl = document.getElementById('photo-preview');
        const candidatePhotoInput = document.getElementById('candidate-photo-input');
        const vicePhotoPreviewEl = document.getElementById('vice-photo-preview');
        const viceCandidatePhotoInput = document.getElementById('vice-candidate-photo-input');
        const vicePresidentFields = document.getElementById('vice-president-fields');
        const presidentDropZone = document.getElementById('president-drop-zone');
        const vicePresidentDropZone = document.getElementById('vice-president-drop-zone');
        
        // 모달 및 제어 장치
        const modalBackdrop = document.getElementById('modal-backdrop');
        const confirmModal = document.getElementById('confirm-modal');
        const confirmModalBody = document.getElementById('confirm-modal-body');
        const modalCancelBtn = document.getElementById('modal-cancel-btn');
        const modalConfirmBtn = document.getElementById('modal-confirm-btn');
        const resultsModal = document.getElementById('results-modal');
        const resultsModalTitle = document.getElementById('results-modal-title');
        const resultsModalBody = document.getElementById('results-modal-body');
        const resultsModalCloseBtn = document.getElementById('results-modal-close-btn');
        const resultsModalFooterCloseBtn = document.getElementById('results-modal-footer-close-btn');
        
        const showResultsBtn = document.getElementById('show-results-btn');
        const resetVotesBtn = document.getElementById('reset-votes-btn');
        const saveListBtn = document.getElementById('save-list-btn');
        const loadListBtn = document.getElementById('load-list-btn');
        const loadListInput = document.getElementById('load-list-input');

        // --- 초기화 ---
        function initializeVoteCounts() {
            voteCounts = {};
            for (const type in elections) {
                voteCounts[type] = {
                    candidates: {},
                    branco: 0,
                    nulo: 0,
                };
            }
        }
        
        // --- 맞춤 모달 시스템 ---
        function showModal(type, context) {
            modalBackdrop.classList.remove('hidden');
            if (type === 'confirm') {
                confirmModal.classList.remove('hidden');
                confirmModal.classList.add('flex');
                confirmModalBody.textContent = context.message;
                actionToConfirm = context.action;
            } else if (type === 'results') {
                renderResults();
                resultsModal.classList.remove('hidden');
                resultsModal.classList.add('flex');
            }
        }
        
        function hideAllModals() {
            modalBackdrop.classList.add('hidden');
            confirmModal.classList.add('hidden');
            confirmModal.classList.remove('flex');
            resultsModal.classList.add('hidden');
            resultsModal.classList.remove('flex');
            actionToConfirm = null;
        }

        // --- 선거 관리 패널 가동부 ---
        function renderCandidateList() {
            candidateListEl.innerHTML = '';
            const currentCandidates = elections[currentElectionType].candidates;
            if (Object.keys(currentCandidates).length === 0) {
                candidateListEl.innerHTML = '<p class="text-gray-500 text-xs text-center py-2">등록된 후보가 없습니다.</p>';
                return;
            }
            const sortedNumbers = Object.keys(currentCandidates).sort((a, b) => a.localeCompare(b));
            for (const number of sortedNumbers) {
                const candidate = currentCandidates[number];
                const viceInfo = candidate.viceName ? `<br><span class="text-[10px] text-gray-500">부통령: ${candidate.viceName}</span>` : '';
                const item = document.createElement('div');
                item.className = 'flex justify-between items-center p-1.5 bg-white rounded text-xs mb-1 shadow-sm';
                item.innerHTML = `
                    <div class="flex items-center gap-2 overflow-hidden mr-2">
                        <img src="${candidate.photo}" class="w-6 h-8 object-cover rounded-sm flex-shrink-0 bg-gray-100">
                        <div class="truncate">
                            <span class="font-bold text-gray-800">${candidate.name}</span> (${candidate.party}) - <span class="font-semibold text-indigo-600">${number}</span>
                            ${viceInfo}
                        </div>
                    </div>
                    <button onclick="handleDeleteCandidate('${number}')" class="text-red-500 hover:text-red-700 font-bold text-lg px-2 flex-shrink-0">&times;</button>
                `;
                candidateListEl.appendChild(item);
            }
        }
        
        function handleElectionTypeChange() {
            currentElectionType = electionTypeSelector.value;
            const presidentPhotoLabel = document.querySelector('#president-drop-zone label');
            if (currentElectionType === 'presidente') {
                vicePresidentFields.classList.remove('hidden');
                presidentPhotoLabel.textContent = '대통령 사진 (클릭/드래그)';
            } else {
                vicePresidentFields.classList.add('hidden');
                presidentPhotoLabel.textContent = '후보 사진 (클릭/드래그)';
            }
            renderCandidateList();
            startStage();
        }

        async function handleAddCandidate(event) {
            event.preventDefault();
            const name = document.getElementById('candidate-name-input').value.trim();
            const party = document.getElementById('candidate-party-input').value.trim();
            const number = document.getElementById('candidate-number-input').value.trim();
            const photoFile = candidatePhotoInput.files[0];

            if (!name || !party || !number) {
                alert('모든 입력 칸을 올바르게 채워주세요.');
                return;
            }

            const expectedDigits = elections[currentElectionType].digits;
            if (number.length !== expectedDigits || !/^\d+$/.test(number)) {
                alert(`기호는 반드시 ${expectedDigits}자리 숫자로 입력해야 합니다.`);
                return;
            }
            if (elections[currentElectionType].candidates[number]) {
                alert('해당 기호로 등록된 후보가 이미 존재합니다.');
                return;
            }

            const readFileAsDataURL = (file) => {
                return new Promise((resolve, reject) => {
                    if (!file) {
                        resolve(null);
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            };

            const photoData = await readFileAsDataURL(photoFile) || `https://placehold.co/120x140/c0c0c0/000?text=${name.substring(0,10)}`;
            const newCandidate = { name, party, photo: photoData };

            if (currentElectionType === 'presidente') {
                const viceName = document.getElementById('vice-candidate-name-input').value.trim();
                const vicePhotoFile = viceCandidatePhotoInput.files[0];
                if (viceName) {
                    newCandidate.viceName = viceName;
                    newCandidate.vicePhoto = await readFileAsDataURL(vicePhotoFile) || `https://placehold.co/100x120/c0c0c0/000?text=${viceName.substring(0,10)}`;
                }
            }

            elections[currentElectionType].candidates[number] = newCandidate;
            renderCandidateList();
            addCandidateForm.reset();
            photoPreviewEl.classList.add('hidden');
            photoPreviewEl.src = '';
            vicePhotoPreviewEl.classList.add('hidden');
            vicePhotoPreviewEl.src = '';
            candidatePhotoInput.value = '';
            viceCandidatePhotoInput.value = '';
        }

        // 특정 후보 지우기
        function handleDeleteCandidate(number) {
             const candidate = elections[currentElectionType].candidates[number];
             showModal('confirm', {
                 message: `정말로 후보 [${candidate.name} - ${number}]를 삭제하시겠습니까?`,
                 action: () => {
                    delete elections[currentElectionType].candidates[number];
                    renderCandidateList();
                 }
             })
        }

        function updatePhotoPreview(file, previewElement) {
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewElement.src = e.target.result;
                    previewElement.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        }
        
        function handleResetVotes() {
            showModal('confirm', {
                message: '모든 기록을 파기하고 선거 투표 데이터를 리셋하시겠습니까?',
                action: () => {
                    initializeVoteCounts();
                    alert('모든 투표 결과가 깨끗하게 초기화되었습니다.');
                }
            });
        }
        
        function handleSaveList() {
            try {
                const dataStr = JSON.stringify(elections, null, 2);
                const blob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'urna-candidates.json';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch (error) {
                console.error("저장 불가:", error);
                alert("후보자 보존 도중 장애가 발생했습니다.");
            }
        }
        
        function handleLoadListFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const loadedData = JSON.parse(e.target.result);
                    if (loadedData.presidente && loadedData.senador && loadedData.deputado) {
                        elections = loadedData;
                        initializeVoteCounts();
                        handleElectionTypeChange();
                        alert('후보자 데이터를 성공적으로 복원했습니다.');
                    } else {
                        throw new Error('유효하지 않은 양식입니다.');
                    }
                } catch (error) {
                    console.error("복원 실패:", error);
                    alert("가져온 후보 데이터 규격이 맞지 않습니다.");
                } finally {
                    loadListInput.value = '';
                }
            };
            reader.readAsText(file);
        }

        // --- 실시간 투표 집계 결과 화면 ---
        function renderResults() {
            const electionData = elections[currentElectionType];
            const electionVotes = voteCounts[currentElectionType];
            resultsModalTitle.textContent = `${electionData.title} 투표 결과`;

            const results = [];
            for (const number in electionData.candidates) {
                const candidate = electionData.candidates[number];
                const votes = electionVotes.candidates[number] || 0;
                results.push({ ...candidate, number, votes });
            }
            
            const totalCandidateVotes = results.reduce((sum, c) => sum + c.votes, 0);
            const totalVotes = totalCandidateVotes + electionVotes.branco + electionVotes.nulo;
            
            results.sort((a, b) => b.votes - a.votes);

            let html = `<div class="space-y-3 text-sm">`;
            if (totalVotes === 0) {
                html += '<p class="text-center text-gray-500 py-8">기록된 투표가 단 1표도 존재하지 않습니다.</p>';
            } else {
                 results.forEach(candidate => {
                    const percentage = totalVotes > 0 ? ((candidate.votes / totalVotes) * 100).toFixed(2) : 0;
                    const viceInfo = candidate.viceName ? `<p class="text-xs text-gray-500">부통령: ${candidate.viceName}</p>` : '';
                    html += `
                        <div class="flex items-center bg-gray-100 p-2 rounded-lg">
                            <img src="${candidate.photo}" class="w-10 h-14 object-cover rounded mr-3 bg-gray-200">
                            <div class="flex-grow min-w-0">
                                <p class="font-bold truncate text-gray-800">${candidate.name} (${candidate.party})</p>
                                <p class="text-xs text-indigo-600">기호: ${candidate.number}</p>
                                ${viceInfo}
                            </div>
                            <div class="text-right flex-shrink-0 pl-2">
                                <p class="font-bold text-base text-gray-800">${candidate.votes} 표</p>
                                <p class="text-xs text-gray-600 font-semibold">${percentage}%</p>
                            </div>
                        </div>
                    `;
                });
                
                const brancoPercentage = totalVotes > 0 ? ((electionVotes.branco / totalVotes) * 100).toFixed(2) : 0;
                const nuloPercentage = totalVotes > 0 ? ((electionVotes.nulo / totalVotes) * 100).toFixed(2) : 0;
                
                html += `
                    <div class="border-t pt-3 mt-3 space-y-2 text-gray-700">
                        <div class="flex justify-between items-center"><span>기권 (Branco):</span> <span class="font-semibold">${electionVotes.branco} 표 (${brancoPercentage}%)</span></div>
                        <div class="flex justify-between items-center"><span>무효 (Nulo):</span> <span class="font-semibold">${electionVotes.nulo} 표 (${nuloPercentage}%)</span></div>
                        <div class="flex justify-between items-center font-bold text-base border-t pt-2 mt-2 text-gray-900"><span>총 투표수:</span> <span>${totalVotes} 표</span></div>
                    </div>
                `;
            }
            html += `</div>`;
            resultsModalBody.innerHTML = html;
        }

        // --- 실 투표 기기 로직 가동부 ---
        function startStage() {
            let stage = elections[currentElectionType];
            officeTitleEl.innerHTML = stage.title;
            currentNumber = '';
            isBlankVote = false;
            numberInputsEl.innerHTML = '';
            
            // 반응형 크기의 자릿수 상자 생성
            for (let i = 0; i < stage.digits; i++) {
                const box = document.createElement('div');
                box.className = 'numero-input w-8 h-10 sm:w-10 sm:h-12 flex items-center justify-center text-xl sm:text-2xl lg:text-3xl bg-white font-bold rounded shadow-sm';
                numberInputsEl.appendChild(box);
            }
            updateInterface();
        }

        function restartVote() {
            endScreenEl.classList.add('hidden');
            endScreenEl.classList.remove('flex');
            mainContentEl.classList.remove('hidden');
            instructionsEl.classList.remove('hidden');
            startStage();
        }

        function updateInterface() {
            let stage = elections[currentElectionType];
            let candidate = elections[currentElectionType].candidates[currentNumber];
            let numberBoxes = numberInputsEl.querySelectorAll('div');

            for(let i=0; i<numberBoxes.length; i++) {
                numberBoxes[i].textContent = currentNumber[i] || '';
            }
            
            const placeholderImg = 'https://placehold.co/120x140/d1d5db/d1d5db?text=.';
            const vicePlaceholderImg = 'https://placehold.co/100x120/d1d5db/d1d5db?text=.';

            candidateInfoEl.classList.add('hidden');
            viceCandidateInfoEl.classList.add('hidden');
            vicePresidentPhotoBoxEl.classList.add('hidden');
            candidatePhotoEl.src = placeholderImg;
            viceCandidatePhotoEl.src = vicePlaceholderImg;
            
            specialMessageEl.classList.add('hidden');
            instructionsEl.classList.remove('hidden');

            if (isBlankVote) {
                 specialMessageEl.innerHTML = 'VOTO EM BRANCO';
                 specialMessageEl.classList.remove('hidden');
            } else if (currentNumber.length === stage.digits) {
                if (candidate) {
                    candidateInfoEl.classList.remove('hidden');
                    candidateNameEl.textContent = candidate.name;
                    candidatePartyEl.textContent = candidate.party;
                    candidatePhotoEl.src = candidate.photo;
                    
                    if (currentElectionType === 'presidente' && candidate.viceName) {
                        viceCandidateInfoEl.classList.remove('hidden');
                        viceCandidateNameEl.textContent = candidate.viceName;
                        vicePresidentPhotoBoxEl.classList.remove('hidden');
                        viceCandidatePhotoEl.src = candidate.vicePhoto;
                    }
                } else {
                    specialMessageEl.innerHTML = 'NÚMERO ERRADO<br><span class="text-lg sm:text-xl font-bold">VOTO NULO</span>';
                    specialMessageEl.classList.remove('hidden');
                }
            }
        }

        function keypadClicked(num) {
            let stage = elections[currentElectionType];
            if (currentNumber.length < stage.digits && !isBlankVote) {
                currentNumber += num;
                playSound('key');
                updateInterface();
            }
        }

        function blancoClicked() {
            if(currentNumber === '') {
                isBlankVote = true;
                playSound('key');
                updateInterface();
            }
        }

        function corrigeClicked() {
            playSound('key');
            startStage();
        }

        function confirmaClicked() {
            const stage = elections[currentElectionType];
            const votes = voteCounts[currentElectionType];
            let voteCasted = false;
            
            if (isBlankVote) {
                votes.branco++;
                voteCasted = true;
            } else if (currentNumber.length === stage.digits) {
                if (elections[currentElectionType].candidates[currentNumber]) {
                    if (!votes.candidates[currentNumber]) {
                        votes.candidates[currentNumber] = 0;
                    }
                    votes.candidates[currentNumber]++;
                } else {
                    votes.nulo++;
                }
                voteCasted = true;
            }
            
            if (!voteCasted) { return; }

            playSound('confirm');
            mainContentEl.classList.add('hidden');
            instructionsEl.classList.add('hidden');
            endScreenEl.classList.remove('hidden');
            endScreenEl.classList.add('flex');
        }

        // --- 전체 바인딩 및 이벤트 처리 ---
        window.onload = () => {
            initializeVoteCounts();
            
            // 기본 이벤트 매핑
            electionTypeSelector.addEventListener('change', handleElectionTypeChange);
            addCandidateForm.addEventListener('submit', handleAddCandidate);
            showResultsBtn.addEventListener('click', () => showModal('results'));
            resetVotesBtn.addEventListener('click', handleResetVotes);
            saveListBtn.addEventListener('click', handleSaveList);
            loadListBtn.addEventListener('click', () => loadListInput.click());
            loadListInput.addEventListener('change', handleLoadListFile);

            // 맞춤 모달 시스템 매핑
            modalCancelBtn.addEventListener('click', hideAllModals);
            modalConfirmBtn.addEventListener('click', () => {
                if (typeof actionToConfirm === 'function') actionToConfirm();
                hideAllModals();
            });
            resultsModalCloseBtn.addEventListener('click', hideAllModals);
            resultsModalFooterCloseBtn.addEventListener('click', hideAllModals);
            modalBackdrop.addEventListener('click', hideAllModals);

            // 터치와 마우스 환경 통합 드래그앤드롭 모듈화
            const setupDropZone = (dropZone, fileInput, previewEl) => {
                dropZone.addEventListener('click', () => fileInput.click());
                fileInput.addEventListener('change', (e) => {
                    if (e.target.files.length > 0) {
                        updatePhotoPreview(e.target.files[0], previewEl);
                    }
                });
                dropZone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    dropZone.classList.add('dragover');
                });
                dropZone.addEventListener('dragleave', () => {
                    dropZone.classList.remove('dragover');
                });
                dropZone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    dropZone.classList.remove('dragover');
                    if (e.dataTransfer.files.length > 0) {
                        fileInput.files = e.dataTransfer.files;
                        updatePhotoPreview(fileInput.files[0], previewEl);
                    }
                });
            };

            setupDropZone(presidentDropZone, candidatePhotoInput, photoPreviewEl);
            setupDropZone(vicePresidentDropZone, viceCandidatePhotoInput, vicePhotoPreviewEl);

            handleElectionTypeChange();
        };
    </script>
</body>
</html>
